name: CI pipeline
on:
  push:
    branches:
      - master # اتأكد ان اسم البرانش صح (main ولا master)
    paths-ignore:
      - 'k8s/**'

jobs:
  build:
    runs-on: ubuntu-latest
    # إضافة صلاحيات الكتابة للـ Token التلقائي
    permissions:
      contents: write 

    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # يفضل دايما تستخدم أحدث نسخة v4
        with:
          token: ${{ secrets.GH_TOKEN }}
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # بنرفع صورتين: واحدة ثابتة (latest) وواحدة برقم الـ Commit (SHA)
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/my-devops-app:latest
            ${{ secrets.DOCKER_USERNAME }}/my-devops-app:${{ github.sha }}
      
      - name: Update Kubernetes Manifest
        run: |
          # تعديل التاج في ملف الـ deployment
          sed -i "s|image:.*|image: ${{ secrets.DOCKER_USERNAME }}/my-devops-app:${{ github.sha }}|" k8s/deployment.yaml
          
          # إعدادات الـ Git للكتابة
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add k8s/deployment.yaml
          git commit -m "chore: update image tag to ${{ github.sha }} [skip ci]"
          git push
